# Copy this file to $CODEX_HOME/memory/config.toml and edit local paths.

data_dir = "/Users/you/.codex/memory"
database_path = "/Users/you/.codex/memory/memory.sqlite3"

# Optional explicit import source for `codex-memory seed`; not used by hooks,
# context, dream-report, or normal recall.
official_memories_dir = "/Users/you/.codex/memories"

# Legacy materials for import/export and manual audit only; not runtime recall/fallback.
global_memory_path = "/Users/you/.codex/memory.md"
workspace_root = "/path/to/workspace"

repo_names = [
  "automation",
  "attio-backup",
  "backend",
  "client",
  "climamind-deployments",
  "model",
  "pool-manager",
  "sales",
  "website",
]
